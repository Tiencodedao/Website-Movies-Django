{% extends 'admin_panel/base.html' %}
{% block title %}Xác nhận xóa - CinemaAdmin{% endblock %}
{% block content %}
<h1 class="title">Xác nhận xóa</h1>
<ul class="breadcrumbs">
  <li><a href="{% url 'admin_dashboard' %}">Home</a></li>
  <li class="divider">/</li>
  <li><a href="#" class="active">Xóa</a></li>
</ul>

<div class="data">
  <div class="content-data" style="max-width:520px;text-align:center;">
    <div style="padding:32px 20px;">
      <div style="width:80px;height:80px;background:#fef2f2;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:2.5rem;color:#ef4444;">
        <i class="bx bx-error-circle"></i>
      </div>
      <h2 style="font-size:1.4rem;font-weight:700;color:#111827;margin-bottom:12px;">Bạn có chắc muốn xóa?</h2>
      <div style="background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:16px;margin-bottom:16px;">
        <p style="color:#991b1b;font-weight:600;font-size:1rem;margin:0;">{{ item_name }}</p>
      </div>
      <p style="color:#9ca3af;font-size:14px;margin-bottom:32px;">
        <i class="bx bx-info-circle"></i> Hành động này <strong>không thể hoàn tác</strong>. Dữ liệu sẽ bị xóa vĩnh viễn.
      </p>
      <form method="POST" style="display:flex;gap:12px;justify-content:center;">
        {% csrf_token %}
        <button type="submit"
          style="padding:11px 28px;background:#ef4444;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:600;font-size:14px;display:flex;align-items:center;gap:6px;transition:all .2s;">
          <i class="bx bx-trash"></i> Xác nhận xóa
        </button>
        <a href="{% url cancel_url %}"
          style="padding:11px 24px;background:#f3f4f6;color:#374151;border:1px solid #e5e7eb;text-decoration:none;border-radius:8px;font-size:14px;font-weight:500;display:flex;align-items:center;gap:6px;transition:all .2s;">
          <i class="bx bx-x"></i> Hủy bỏ
        </a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
