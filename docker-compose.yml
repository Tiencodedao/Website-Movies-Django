version: '3.8'

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: cinema_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: cinema
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: cinema_user
      MYSQL_PASSWORD: cinema_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./cinema.sql:/docker-entrypoint-initdb.d/cinema.sql
    networks:
      - cinema_network

  # PHP Application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cinema_web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_NAME: cinema
      DB_USER: cinema_user
      DB_PASSWORD: cinema_pass
    networks:
      - cinema_network

  # phpMyAdmin
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: cinema_phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root_password
    depends_on:
      - db
    networks:
      - cinema_network

volumes:
  db_data:

networks:
  cinema_network:
    driver: bridge
